<!DOCTYPE html>
<html lang="{{ $.Site.LanguageCode }}">
    {{- partial "head.html" . -}}
    <body a="{{ $.Site.Params.theme_config.appearance | default "auto" }}">
        <main class="page-content" aria-label="Content">
            <div class="w">
                {{- block "main" . }}{{- end }}
                {{ partial "footer.html" }}
            </div>
        </main>

        {{ if .Params.mermaid }}
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const els = document.querySelectorAll("pre code.language-mermaid");
                els.forEach((el) => {
                    const parent = el.parentElement;
                    const div = document.createElement("div");
                    div.className = "mermaid";
                    div.textContent = el.textContent;
                    parent.parentElement.replaceChild(div, parent);
                });
                
                import('https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs').then(m => {
                    m.default.initialize({ startOnLoad: true });
                });
            });
        </script>
        {{ end }}
    </body>
</html>
