{{ partial "header.html" . }}

<section class="archive-section">
    <h1 class="archive-title">{{ .Title }}</h1>
    <div class="archive-list">
        {{ range .Pages }}
        <div class="archive-item">
            <span class="archive-item-date">{{ .Date.Format "2006-01-02" }}</span>
            <a href="{{ .RelPermalink }}" class="archive-item-title">{{ .Title }}</a>
        </div>
        {{ else }}
        <p class="no-posts">暂无内容！</p>
        {{ end }}
    </div>
</section>

{{ partial "footer.html" . }}
